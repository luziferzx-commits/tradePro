name: Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 gqos --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 gqos --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Type check with mypy (non-blocking)
      run: |
        # Report type issues but don't fail the build (codebase is not yet
        # fully typed). Tighten to blocking once the type debt is paid down.
        mypy gqos --ignore-missing-imports || true

    - name: Test with pytest
      run: |
        PYTHONPATH=. pytest tests/
